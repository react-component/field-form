name: React Doctor

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: millionco/react-doctor@0b4f4f4bd248a154e64eb508a48347f71154b3f3
